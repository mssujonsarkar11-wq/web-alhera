    <style>
        html { scroll-behavior: smooth; }
        body { 
            background: radial-gradient(circle at top, #065f46, #020617); 
            font-family: 'Hind Siliguri', sans-serif; 
            color: white; 
            margin: 0; 
            min-height: 100vh; 
        }

        
        /* Glassmorphism Card Style */
        .member-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(16, 185, 129, 0.15); 
            border-radius: 24px; 
            padding: 24px; 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            backdrop-filter: blur(16px);
            position: relative;
            overflow: hidden;
        }
        
        .member-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.05) 0%, transparent 100%);
            z-index: -1;
        }

        .member-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(16, 185, 129, 0.2); 
            border-color: rgba(16, 185, 129, 0.5);
            background: rgba(255, 255, 255, 0.06);
        }
        
        .avatar-box { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            border: 4px solid #10b981; 
            margin: 0 auto 18px; 
            overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(6, 78, 59, 0.4));
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-box span { font-size: 2.8rem; font-weight: bold; color: #34d399; }

        /* Smart Info Rows */
        .info-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 25px; }
        .info-row { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px; 
            padding: 8px 18px; 
            font-size: 0.88rem; 
            width: fit-content; 
            min-width: 200px;
            color: #d1d5db;
        }
        
        .hero-btn { padding: 10px 24px; border-radius: 12px; transition: .3s; border: 1px solid #10b981; background: rgba(16, 185, 129, 0.1); }
        .hero-btn.active { background: #10b981; color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }

        /* Mobile Menu */
        #mobileMenu { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: #020617; padding: 40px 25px; transition: .4s ease; z-index: 100; border-left: 1px solid #10b981; }
        #mobileMenu.show { right: 0; }
        .nav-link { position: relative; padding-bottom: 4px; }
        .nav-link:hover::after, .nav-link.active::after { content: ""; position: absolute; left: 0; bottom: 0; width: 100%; height: 2px; background: #10b981; }
